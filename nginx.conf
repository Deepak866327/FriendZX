# Detect WebSocket upgrade requests
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — resolve upstreams at request time, not at startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_connect_timeout  60s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    client_max_body_size  250m;

    # ── Notifications WebSocket + REST (direct to notification-service) ──
    location /notifications/ {
        set $notif http://notification-service:3004;
        proxy_pass         $notif/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_buffering    off;
    }

    # ── Bluetooth WebSocket (location-service) ──────────────────────────
    location /bluetooth-ws/ {
        set $loc http://location-service:3003;
        proxy_pass         $loc/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_buffering    off;
    }

    # ── Random Connect WebSocket ──────────────────────────────────────
    location /rc/ {
        set $rc http://random-connect-service:3007;
        proxy_pass         $rc/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_buffering    off;
    }

    # ── Static media — no auth, streaming-friendly ──────────────────────
    location /api/posts/uploads/ {
        set $posts http://post-service:3006;
        proxy_pass              $posts/uploads/;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_set_header        Range $http_range;
        proxy_set_header        Host  $host;
        add_header              Accept-Ranges bytes;
    }

    location /api/crations/uploads/ {
        set $posts http://post-service:3006;
        proxy_pass              $posts/crations/uploads/;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_set_header        Range $http_range;
        proxy_set_header        Host  $host;
        add_header              Accept-Ranges bytes;
    }

    location /api/posts/stories/uploads/ {
        set $posts http://post-service:3006;
        proxy_pass              $posts/stories/uploads/;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_set_header        Host $host;
    }

    location /api/notifications/chat/attachment/ {
        set $notif http://notification-service:3004;
        proxy_pass              $notif/chat/attachment/;
        proxy_http_version      1.1;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_set_header        Host $host;
    }

    # ── All other /api/* → API Gateway ──────────────────────────────────
    location /api/ {
        set $gw http://api-gateway:3000;
        proxy_pass              $gw;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection $connection_upgrade;
        proxy_set_header        Host       $host;
        proxy_set_header        X-Real-IP  $remote_addr;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_cache_bypass      $http_upgrade;
        client_max_body_size    250m;
    }

    # ── React SPA fallback ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
